<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YIC Events | Events</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="modal-overlay" id="eventDetailsModal">
    <div class="modal-card">
      <button class="close-modal" onclick="closeEventDetailsModal()">✕</button>
      <h3 id="modalEventTitle">Event Title</h3>
      <div class="modal-event-details">
        <p><strong>Date:</strong> <span id="modalEventDate"></span></p>
        <p><strong>Location:</strong> <span id="modalEventLocation"></span></p>
        <p><strong>Category:</strong> <span id="modalEventCategory"></span></p>
        <p><strong>Description:</strong></p>
        <p id="modalEventDescription"></p>
      </div>
      <div class="modal-actions">
        <button class="btn main-btn" id="modalRegisterBtn">Register for Event</button>
      </div>
    </div>
  </div>
  <header class="site-header">
    <div class="container header-inner">
      <span class="logo">YIC Events</span>
      <nav class="top-nav">
        <a id="pageEventsLink" href="events.html" class="active">Events</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <!-- Admin Taskbar View (Single Event) -->
    <div id="adminTaskbar" class="admin-taskbar" style="display: none;">
      <div class="taskbar-header">
        <a id="taskbarBackBtn" href="admin.html" class="dashboard-events-btn">Back</a>
        <h2>Browse Events</h2>
        <div class="taskbar-nav">
          <button id="taskbarPrevBtn" class="taskbar-nav-btn" title="Previous Event">←</button>
          <span id="taskbarEventCounter">1 / 1</span>
          <button id="taskbarNextBtn" class="taskbar-nav-btn" title="Next Event">→</button>
        </div>
      </div>
      <div class="taskbar-content">
        <div id="taskbarEventCard" class="taskbar-event-card"></div>
      </div>
    </div>

    <!-- Regular Grid View -->
    <div id="gridView">
      <!-- Search and Filter Section -->
      <div class="events-header">
        <a id="pageBackBtn" href="dashboard.html" class="dashboard-events-btn">Back</a>
        <div class="search-bar">
          <input type="text" class="search-input" placeholder="Enter keyword" />
          <select class="filter-dropdown">
            <option>Date</option>
            <option>Upcoming</option>
            <option>This Week</option>
            <option>This Month</option>
          </select>
          <select class="filter-dropdown">
            <option>Category</option>
            <option>Sports</option>
            <option>Academic</option>
            <option>Social</option>
            <option>Cultural</option>
          </select>
        </div>
      </div>
      <div class="events-grid" id="eventsGrid"></div>
    </div>
    <!-- End Grid View -->
  </main>
  <div class="modal-overlay" id="confirmationModal">
    <div class="modal-card">
      <h3 id="modalTitle">Confirmation</h3>
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn yes-btn" onclick="confirmModalChoice(true)">Yes</button>
        <button class="btn no-btn" onclick="confirmModalChoice(false)">No</button>
      </div>
    </div>
  </div>
  <footer class="site-footer">
    <p>YIC Events</p>
    <p>Layan 441500004 ~ Nada 441500071</p>
  </footer>
  <script src="../js/script.js?v=3"></script>
</body>
</html>
